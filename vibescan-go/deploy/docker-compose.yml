# Production stack for the VibeScan MVP: the Go app (UI + APIs + ingest) behind
# Caddy (automatic HTTPS). MongoDB (Atlas) and R2 are external — configured via
# .env. Run from this directory:  docker compose up -d --build
#
# Provide a GeoLite2-City.mmdb next to this file for GeoIP (optional but
# recommended). Fill .env from .env.example first.

# Bounded container logs so a small disk never fills.
x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    build:
      context: ../..                 # repo root (vibescan_rework/)
      dockerfile: vibescan-go/Dockerfile
    env_file: .env
    environment:
      - PORT=8000
      - GEOLITE2_CITY_MMDB=/app/GeoLite2-City.mmdb
      - VIBESCAN_BUFFER_DIR=/app/cache/server_buffer
    volumes:
      - ./GeoLite2-City.mmdb:/app/GeoLite2-City.mmdb:ro
      - app_buffer:/app/cache/server_buffer
    expose:
      - "8000"
    restart: unless-stopped
    logging: *logging

  caddy:
    image: caddy:2-alpine
    env_file: .env                    # provides DOMAIN
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped
    logging: *logging

volumes:
  caddy_data:
  caddy_config:
  app_buffer:
