version: 2
updates:
  - package-ecosystem: gomod
    directory: /vibescan-go
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /vibescan-ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      ui-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /vibescan-go
    schedule:
      interval: weekly
