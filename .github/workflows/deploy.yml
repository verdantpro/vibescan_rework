# Test → build the app image → push to Amazon ECR → roll the stack on EC2 via
# SSM (no inbound SSH required). Setup: vibescan-go/deploy/DEPLOY.md § "CI/CD".
name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "vibescan-go/**"
      - "vibescan-ui/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

# OIDC: the deploy job assumes an AWS role via a short-lived token instead of
# long-lived access keys. `id-token: write` is required to mint the token.
permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: vibescan
  # Path on the EC2 host that contains docker-compose.registry.yml + .env
  DEPLOY_DIR: /home/ubuntu/deploy

jobs:
  # Fast, deterministic gate: production never ships code that fails these.
  # (The CI workflow adds the heavier govulncheck / lint / Trivy scans on PRs.)
  test:
    name: Test gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version-file: vibescan-go/go.mod
          cache-dependency-path: vibescan-go/go.sum
      - name: go vet
        working-directory: vibescan-go
        run: go vet ./...
      - name: go test
        working-directory: vibescan-go
        # -short skips browser/capture tests that need a real headless Chromium
        # (not available on CI runners); they self-guard with testing.Short().
        run: go test -short ./...
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vibescan-ui/package-lock.json
      - name: UI install
        working-directory: vibescan-ui
        run: npm ci
      - name: UI typecheck + build
        working-directory: vibescan-ui
        run: npm run build

  deploy:
    name: Build → ECR → SSM deploy
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Image name
        id: meta
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          TAG="$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          IMAGE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${TAG}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Will push and deploy: ${IMAGE}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: vibescan-go/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on EC2 via SSM
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
        run: |
          set -euo pipefail
          if [ -z "${INSTANCE_ID}" ]; then
            echo "Missing secret EC2_INSTANCE_ID (i-…)" >&2
            exit 1
          fi
          REGISTRY="${IMAGE%%/*}"

          # The entire remote rollout runs as ONE AWS-RunShellScript command so
          # shell state (the previous image, the rollback function) persists
          # across steps. AWS-RunShellScript uses /bin/sh (dash) — POSIX only,
          # no `set -e`; every step guards itself and rolls back on failure.
          # Local $VARS expand here; \$VARS are deferred to the remote host.
          REMOTE_SCRIPT=$(cat <<EOF
          set -u
          cd "$DEPLOY_DIR" || { echo CD_FAILED >&2; exit 1; }
          test -f .env || { echo ENV_MISSING >&2; exit 1; }

          # Record the currently-running image so a failed rollout can revert.
          PREV=\$(docker inspect -f '{{.Config.Image}}' "\$(docker compose -f docker-compose.registry.yml ps -q app 2>/dev/null)" 2>/dev/null || echo "")
          echo prev_image=\${PREV:-none}

          rollback() {
            echo "ROLLING_BACK to \${PREV:-none}" >&2
            if [ -n "\$PREV" ]; then
              sed -i "s|^IMAGE=.*|IMAGE=\$PREV|" .env
              docker compose -f docker-compose.registry.yml up -d || echo ROLLBACK_UP_FAILED >&2
            else
              echo "No previous image recorded; cannot roll back." >&2
            fi
          }

          # Point the stack at the new image.
          if grep -qE "^IMAGE=" .env; then
            sed -i "s|^IMAGE=.*|IMAGE=$IMAGE|" .env
          else
            printf "\nIMAGE=%s\n" "$IMAGE" >> .env
          fi

          # ECR auth on the box (tokens expire ~12h).
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$REGISTRY" || { echo ECR_LOGIN_FAILED >&2; exit 1; }

          docker compose -f docker-compose.registry.yml pull || { echo PULL_FAILED >&2; exit 1; }
          docker compose -f docker-compose.registry.yml up -d || { echo UP_FAILED >&2; rollback; exit 1; }

          # A no-op roll must never look like success.
          RUNNING=\$(docker inspect -f '{{.Config.Image}}' "\$(docker compose -f docker-compose.registry.yml ps -q app)")
          echo running_image=\$RUNNING
          [ "\$RUNNING" = "$IMAGE" ] || { echo "IMAGE_MISMATCH expected=$IMAGE got=\$RUNNING" >&2; rollback; exit 1; }

          # Migrations must succeed — a failed migration no longer sails on silently.
          docker compose -f docker-compose.registry.yml run --rm --entrypoint migrate app || { echo MIGRATE_FAILED >&2; rollback; exit 1; }

          sleep 3
          # A failed health check rolls back to the previous image, then fails.
          curl -fsS --max-time 20 https://vibescan.verdantprotocol.com/api/healthz || { echo HEALTHCHECK_FAILED >&2; rollback; exit 1; }
          echo Healthcheck OK
          EOF
          )

          PARAMS=$(jq -n --arg s "$REMOTE_SCRIPT" '{commands: [$s]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "vibescan deploy ${{ steps.meta.outputs.tag }}" \
            --timeout-seconds 900 \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)
          echo "SSM CommandId=${COMMAND_ID}"

          for i in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "[$i] status=${STATUS}"
            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "[StandardOutputContent,StandardErrorContent]" \
                  --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                echo "----- stdout -----"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardOutputContent" --output text || true
                echo "----- stderr -----"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" --output text || true
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for SSM command" >&2
          exit 1

      - name: Summary
        run: |
          {
            echo "### Deployed \`${{ steps.meta.outputs.tag }}\`"
            echo ""
            echo "- Image: \`${{ steps.meta.outputs.image }}\`"
            echo "- Site: https://vibescan.verdantprotocol.com/"
            echo "- Transport: **AWS SSM** (no inbound SSH)"
            echo "- Auth: **GitHub OIDC** (assumed role, no static keys)"
          } >> "$GITHUB_STEP_SUMMARY"
