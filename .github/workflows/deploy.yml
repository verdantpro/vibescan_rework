# Build the app image → push to Amazon ECR → roll the stack on EC2 via SSM
# (no inbound SSH required). Setup: vibescan-go/deploy/DEPLOY.md § "CI/CD".
name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "vibescan-go/**"
      - "vibescan-ui/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: vibescan
  # Path on the EC2 host that contains docker-compose.registry.yml + .env
  DEPLOY_DIR: /home/ubuntu/deploy

jobs:
  deploy:
    name: Build → ECR → SSM deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Image name
        id: meta
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          TAG="$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          IMAGE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${TAG}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Will push and deploy: ${IMAGE}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: vibescan-go/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on EC2 via SSM
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
        run: |
          set -euo pipefail
          if [ -z "${INSTANCE_ID}" ]; then
            echo "Missing secret EC2_INSTANCE_ID (i-…)" >&2
            exit 1
          fi

          # AWS-RunShellScript invokes /bin/sh (dash on Ubuntu), which rejects
          # "set -o pipefail". Ship a bash script as base64 so quoting stays safe.
          REMOTE_SCRIPT=$(cat <<EOF
          set -euo pipefail
          IMAGE='${IMAGE}'
          DEPLOY_DIR='${DEPLOY_DIR}'
          cd "\$DEPLOY_DIR"
          test -f .env || { echo "missing \$DEPLOY_DIR/.env" >&2; exit 1; }
          if grep -qE '^IMAGE=' .env; then
            sed -i "s|^IMAGE=.*|IMAGE=\${IMAGE}|" .env
          else
            printf '\nIMAGE=%s\n' "\$IMAGE" >> .env
          fi
          echo "Deploying IMAGE=\${IMAGE}"
          docker compose -f docker-compose.registry.yml pull
          docker compose -f docker-compose.registry.yml up -d
          docker compose -f docker-compose.registry.yml run --rm --entrypoint migrate app \
            || echo "migrate skipped/failed (app also ensures indexes)"
          sleep 3
          curl -fsS --max-time 20 https://vibescan.verdantprotocol.com/api/healthz
          echo
          echo Healthcheck OK
          EOF
          )

          B64=$(printf '%s' "$REMOTE_SCRIPT" | base64 | tr -d '\n')
          PARAMS=$(jq -n --arg b64 "$B64" \
            '{commands: ["echo \($b64) | base64 -d | bash"]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "vibescan deploy ${{ steps.meta.outputs.tag }}" \
            --timeout-seconds 900 \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)
          echo "SSM CommandId=${COMMAND_ID}"

          for i in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "[$i] status=${STATUS}"
            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "[StandardOutputContent,StandardErrorContent]" \
                  --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                echo "----- stdout -----"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardOutputContent" --output text || true
                echo "----- stderr -----"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" --output text || true
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for SSM command" >&2
          exit 1

      - name: Summary
        run: |
          {
            echo "### Deployed \`${{ steps.meta.outputs.tag }}\`"
            echo ""
            echo "- Image: \`${{ steps.meta.outputs.image }}\`"
            echo "- Site: https://vibescan.verdantprotocol.com/"
            echo "- Transport: **AWS SSM** (no inbound SSH)"
          } >> "$GITHUB_STEP_SUMMARY"
