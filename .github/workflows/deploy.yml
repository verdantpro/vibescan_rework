# Build the app image → push to Amazon ECR → SSH to EC2 and roll the stack.
# Required GitHub secrets: see vibescan-go/deploy/DEPLOY.md § "CI/CD".
name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "vibescan-go/**"
      - "vibescan-ui/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: # manual "Run workflow" from the Actions tab

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: vibescan

jobs:
  deploy:
    name: Build → ECR → EC2
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Image name
        id: meta
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          TAG="$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          IMAGE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${TAG}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Will push and deploy: ${IMAGE}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: vibescan-go/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.2
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE
          script_stop: true
          script: |
            set -euo pipefail
            cd "${DEPLOY_DIR:-$HOME/deploy}"
            if [ ! -f .env ]; then
              echo "missing $PWD/.env — copy deploy/.env.example and fill secrets first" >&2
              exit 1
            fi
            # Pin the new immutable tag (create IMAGE= line if absent).
            if grep -qE '^IMAGE=' .env; then
              sed -i "s|^IMAGE=.*|IMAGE=${IMAGE}|" .env
            else
              printf '\nIMAGE=%s\n' "${IMAGE}" >> .env
            fi
            echo "Deploying IMAGE=${IMAGE}"
            docker compose -f docker-compose.registry.yml pull
            docker compose -f docker-compose.registry.yml up -d
            # Idempotent indexes; non-fatal if Mongo is briefly unreachable.
            docker compose -f docker-compose.registry.yml run --rm --entrypoint migrate app \
              || echo "migrate skipped/failed (will also run on app startup)"
            # Health via the public hostname when DNS works, else local loopback.
            sleep 3
            if curl -fsS --max-time 15 "https://${DOMAIN:-vibescan.verdantprotocol.com}/api/healthz"; then
              echo
              echo "Healthcheck OK"
            else
              echo "public healthcheck failed; containers:"
              docker compose -f docker-compose.registry.yml ps
              docker compose -f docker-compose.registry.yml logs --tail=40 app
              exit 1
            fi

      - name: Summary
        run: |
          echo "### Deployed \`${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.meta.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Site: https://vibescan.verdantprotocol.com/" >> "$GITHUB_STEP_SUMMARY"
