# Build the app image → push to Amazon ECR → roll the stack on EC2 via SSM
# (no inbound SSH required). Setup: vibescan-go/deploy/DEPLOY.md § "CI/CD".
name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "vibescan-go/**"
      - "vibescan-ui/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: vibescan
  # Path on the EC2 host that contains docker-compose.registry.yml + .env
  DEPLOY_DIR: /home/ubuntu/deploy

jobs:
  deploy:
    name: Build → ECR → SSM deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Image name
        id: meta
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          TAG="$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          IMAGE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${TAG}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Will push and deploy: ${IMAGE}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: vibescan-go/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on EC2 via SSM
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
        run: |
          set -euo pipefail
          if [ -z "${INSTANCE_ID}" ]; then
            echo "Missing secret EC2_INSTANCE_ID (i-…)" >&2
            exit 1
          fi

          # IMPORTANT: AWS-RunShellScript runs each command with /bin/sh (dash).
          # Do NOT use bash-only options (pipefail). Each array entry is one sh -c.
          # Failures stop the remaining commands automatically.
          PARAMS=$(jq -n \
            --arg image "$IMAGE" \
            --arg dir "$DEPLOY_DIR" \
            --arg region "$AWS_REGION" \
            '{
              commands: [
                ("echo Deploying " + $image),
                ("cd " + $dir),
                "test -f .env",
                (
                  "if grep -qE \"^IMAGE=\" .env; then " +
                  "sed -i \"s|^IMAGE=.*|IMAGE=" + $image + "|\" .env; " +
                  "else printf \"\\nIMAGE=%s\\n\" \"" + $image + "\" >> .env; fi"
                ),
                # Authenticate to ECR on the box (tokens expire ~12h). Without
                # this the pull below fails and — since sh has no set -e — the
                # script would sail on to the healthcheck and report a green
                # deploy while the OLD container keeps running.
                ("aws ecr get-login-password --region " + $region +
                  " | docker login --username AWS --password-stdin " +
                  ($image | split("/")[0]) +
                  " || { echo ECR_LOGIN_FAILED >&2; exit 1; }"),
                "docker compose -f docker-compose.registry.yml pull || { echo PULL_FAILED >&2; exit 1; }",
                "docker compose -f docker-compose.registry.yml up -d || { echo UP_FAILED >&2; exit 1; }",
                # Fail loudly if the running app image is not the tag we just
                # deployed — a no-op roll must never look like success.
                ("RUNNING=$(docker inspect -f \"{{.Config.Image}}\" $(docker compose -f docker-compose.registry.yml ps -q app)); " +
                  "echo running_image=$RUNNING; " +
                  "test \"$RUNNING\" = \"" + $image + "\" || { echo IMAGE_MISMATCH expected=" + $image + " >&2; exit 1; }"),
                "docker compose -f docker-compose.registry.yml run --rm --entrypoint migrate app || true",
                "sleep 3",
                "curl -fsS --max-time 20 https://vibescan.verdantprotocol.com/api/healthz || { echo HEALTHCHECK_FAILED >&2; exit 1; }",
                "echo",
                "echo Healthcheck OK"
              ]
            }')

          echo "SSM parameters preview (first command): $(echo "$PARAMS" | jq -r '.commands[0]')"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "vibescan deploy ${{ steps.meta.outputs.tag }}" \
            --timeout-seconds 900 \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)
          echo "SSM CommandId=${COMMAND_ID}"

          for i in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "[$i] status=${STATUS}"
            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "[StandardOutputContent,StandardErrorContent]" \
                  --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                echo "----- stdout -----"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardOutputContent" --output text || true
                echo "----- stderr -----"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" --output text || true
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for SSM command" >&2
          exit 1

      - name: Summary
        run: |
          {
            echo "### Deployed \`${{ steps.meta.outputs.tag }}\`"
            echo ""
            echo "- Image: \`${{ steps.meta.outputs.image }}\`"
            echo "- Site: https://vibescan.verdantprotocol.com/"
            echo "- Transport: **AWS SSM** (no inbound SSH)"
          } >> "$GITHUB_STEP_SUMMARY"
